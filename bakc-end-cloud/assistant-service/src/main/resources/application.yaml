server:
  port: 8081

spring:
  application:
    name: assistant-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
        shared-configs:
          - data-id: common.yaml
            group: DEFAULT_GROUP
            refresh: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.XADataSourceAutoConfiguration
      - com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration
  data:
    redis:
      host: localhost
      port: 6379

# LangChain4J配置 - 使用Redis作为向量数据库
langchain4j:
  open-ai:
    chat-model:
      api-key: sk-0395559857e04d5c8d9a51812a17fb76
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen3.5-flash
    streaming-chat-model:
      api-key: sk-0395559857e04d5c8d9a51812a17fb76
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen3.5-flash
    embedding-model:
      api-key: sk-0395559857e04d5c8d9a51812a17fb76
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: text-embedding-v4
  community:
    redis:
      host: localhost
      port: 6379

knowledge:
  base-path: assistant-service/src/main/resources/content

logging:
  level:
    com.environment: debug