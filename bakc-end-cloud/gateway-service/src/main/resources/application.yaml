server:
  port: 8080
spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

    gateway:
      routes:
        # 用户服务路由
        - id: user-service                    # 路由唯一标识
          uri: lb://user-service             # lb:// 表示负载均衡，后接服务名
          predicates: # 路由条件
            - Path=/api/user/**               # 匹配 /api/user/ 开头的请求
          filters:
            - StripPrefix=1                   # 去掉路径第一段

        # AI 助手服务路由
        - id: assistant-service
          uri: lb://assistant-service
          predicates:
            - Path=/api/assistant/**
          filters:
            - StripPrefix=1

        # 数据服务路由
        - id: data-service
          uri: lb://data-service
          predicates:
            - Path=/api/data/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]': # 匹配所有路径
            allowedOriginPatterns: "*"  # 允许所有域名访问
            allowedMethods: # 允许的请求方法
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"        # 允许所有请求头
            allowCredentials: true     # 允许携带 Cookie
            maxAge: 3600               # 预检请求缓存时间（秒）
knife4j:
  gateway:
    enabled: true
    strategy: discover
    discover:
      enabled: true
      version: openapi3