name: Deploy to Servers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'front-end/**'
            backend:
              - 'back-end/**'
            python:
              - 'back-end-python/**'

  deploy-frontend:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - name: Build
        run: cd front-end && npm ci && npm run build
      - name: Clean old assets
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: rm -rf /var/www/environment/assets /var/www/environment/images /var/www/environment/index.html
      - name: Upload to Tencent
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: front-end/dist/*
          target: /var/www/environment/
          strip_components: 2
      - name: Fix permissions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: chmod -R 755 /var/www/environment/

  deploy-backend:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Build
        run: cd back-end && mvn clean package -DskipTests -B
      - name: Rename JAR
        run: cp back-end/target/intelligent-environment-governance-hub-1.0-SNAPSHOT.jar back-end/target/environment-hub.jar
      - name: Upload to Qiniuyun
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.QINIUYUN_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: back-end/target/environment-hub.jar
          target: /opt/environment-hub/
          strip_components: 2
      - name: Restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QINIUYUN_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: pm2 restart environment-hub

  deploy-python:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload source to Qiniuyun
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.QINIUYUN_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: back-end-python
          target: /opt/environment-hub/
          strip_components: 1
      - name: Install deps + Restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QINIUYUN_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/environment-hub/python-backend
            pip install -r requirement.txt -q
            pm2 restart environment-python
